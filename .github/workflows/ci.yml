name: ci-baseline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline smoke check
        shell: pwsh
        run: ./scripts/ci/smoke_check.ps1 -Mode ci

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baseline-assets
          path: |
            execution/**
            ops/artifacts/artifact_manifest_v1.json
            ops/artifacts/ci_smoke_result.json

